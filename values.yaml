# Minimal OpenTelemetry Demo Configuration
# This is the simplest configuration to disable observability components
# and provide your own collector configuration

# Disable all observability backends
jaeger:
  enabled: false
grafana:
  enabled: false
prometheus:
  enabled: false
opensearch:
  enabled: false

# Configure OpenTelemetry Collector with custom config for Causely
opentelemetry-collector:
  enabled: true
  mode: deployment
  image:
    repository: "otel/opentelemetry-collector-contrib"
  presets:
    kubernetesAttributes:
      enabled: true
  config:
    receivers:
      otlp:
        protocols:
          http:
            # Since this collector needs to receive data from the web, enable cors for all origins
            # `allowed_origins` can be refined for your deployment domain
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
      httpcheck/frontend-proxy:
        targets:
          - endpoint: http://frontend-proxy:8080
      nginx:
        endpoint: http://image-provider:8081/status
        collection_interval: 10s
      postgresql:
        endpoint: "postgresql:5432"
        username: "root"
        password: "otel"
        metrics:
          postgresql.blks_hit:
            enabled: true
          postgresql.blks_read:
            enabled: true
          postgresql.tup_fetched:
            enabled: true
          postgresql.tup_returned:
            enabled: true
          postgresql.tup_inserted:
            enabled: true
          postgresql.tup_updated:
            enabled: true
          postgresql.tup_deleted:
            enabled: true
          postgresql.deadlocks:
            enabled: true
        tls:
          insecure: true
      redis:
        endpoint: "valkey-cart:6379"
        username: "valkey"
        collection_interval: 10s

    exporters:
      otlp:
        endpoint: mediator.causely:4317
        compression: none
        tls:
          insecure: true

    processors:
      # This processor is used to help limit high cardinality on next.js span names
      # When this PR is merged (and released) we can remove this transform processor
      # https://github.com/vercel/next.js/pull/64852
      transform:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              # could be removed when https://github.com/vercel/next.js/pull/64852 is fixed upstream
              - replace_pattern(name, "\\?.*", "")
              - replace_match(name, "GET /api/products/*", "GET /api/products/{productId}")
      resourcedetection:
        detectors:
          - env
          - system
      resource:
        attributes:
          - key: service.instance.id
            from_attribute: k8s.pod.uid
            action: insert
      batch:
        timeout: 1s
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
      # Optional: Filter out internal spans
      filter:
        error_mode: ignore
        traces:
          span:
            - 'kind.string == "Internal"'

    connectors:
      spanmetrics: {}

    service:
      pipelines:
        traces:
          processors: [filter, k8sattributes, resource, transform, batch]
          exporters: [otlp, debug, spanmetrics]
        metrics:
          exporters: [otlp, debug]
        logs:
          exporters: [debug]
      telemetry:
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: otel-collector:4318
